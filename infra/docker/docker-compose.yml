version: "3.8"

# =============================================================
# OCR Agent — Full Stack Docker Compose
# All services on ocr-network, reachable by service name
# =============================================================

services:

  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ocr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PG_DATABASE:-ocr_agent}
      POSTGRES_USER:     ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./../../infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-ocr_agent}"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    container_name: ocr-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  minio:
    image: minio/minio:latest
    container_name: ocr-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout:  10s
      retries:  5

  # ── Processing Layer ─────────────────────────────────────────

  n8n:
    image: n8nio/n8n:latest
    container_name: ocr-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST:                    ${N8N_HOST:-localhost}
      N8N_PORT:                    5678
      N8N_PROTOCOL:                http
      WEBHOOK_URL:                 ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_BASIC_AUTH_ACTIVE:       "true"
      N8N_BASIC_AUTH_USER:         ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD:     ${N8N_PASSWORD:-changeme}
      DB_TYPE:                     postgresdb
      DB_POSTGRESDB_HOST:          postgres
      DB_POSTGRESDB_PORT:          5432
      DB_POSTGRESDB_DATABASE:      ${PG_DATABASE:-ocr_agent}
      DB_POSTGRESDB_USER:          ${PG_USER:-postgres}
      DB_POSTGRESDB_PASSWORD:      ${PG_PASSWORD:-postgres}
      DB_POSTGRESDB_SCHEMA:        n8n
      EXECUTIONS_PROCESS:          main
      N8N_LOG_LEVEL:               warn
      GENERIC_TIMEZONE:            UTC
      # Env vars passed into n8n Function nodes
      OLLAMA_HOST:                 http://ollama:11434
      OLLAMA_MODEL:                ${OLLAMA_MODEL:-llama3}
      OPENAI_API_KEY:              ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY:           ${ANTHROPIC_API_KEY:-}
      REDIS_HOST:                  redis
      REDIS_PORT:                  6379
      REDIS_PASSWORD:              ${REDIS_PASSWORD:-}
      BACKEND_URL:                 ${BACKEND_URL:-http://host.docker.internal:5001}
      FIREBASE_PROJECT_ID:         ${FIREBASE_PROJECT_ID:-your-project}
      TESSERACT_HOST:              tesseract-service
      PADDLE_HOST:                 paddle-service
    volumes:
      - n8n-data:/home/node/.n8n
      - ./../../n8n/workflows:/home/node/.n8n/workflows:ro
    networks:
      - ocr-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tesseract-service:
    build:
      context: ./../../services/ocr/tesseract
      dockerfile: Dockerfile
    container_name: ocr-tesseract
    restart: unless-stopped
    ports:
      - "${TESSERACT_PORT:-8884}:8884"
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8884/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  paddle-service:
    build:
      context: ./../../services/ocr/paddle
      dockerfile: Dockerfile
    container_name: ocr-paddle
    restart: unless-stopped
    ports:
      - "${PADDLE_PORT:-8885}:8885"
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8885/health"]
      interval: 30s
      timeout:  15s
      retries:  3

  ai-service:
    build:
      context: ./../../services/ai
      dockerfile: Dockerfile
    container_name: ocr-ai-service
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8386}:8386"
    environment:
      PORT:                 8386
      OLLAMA_HOST:          http://ollama:11434
      OLLAMA_MODEL:         ${OLLAMA_MODEL:-llama3}
      OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
      OPENAI_MODEL:         ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL:      ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      AI_FALLBACK_ENABLED:  "true"
    networks:
      - ocr-network
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8386/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  ollama:
    image: ollama/ollama:latest
    container_name: ocr-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ocr-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout:  10s
      retries:  5

# ── Volumes ────────────────────────────────────────────────────
volumes:
  postgres-data:
    name: ocr-postgres-data
  redis-data:
    name: ocr-redis-data
  minio-data:
    name: ocr-minio-data
  n8n-data:
    name: ocr-n8n-data
  ollama-data:
    name: ocr-ollama-data

# ── Network ─────────────────────────────────────────────────────
networks:
  ocr-network:
    name: ocr-network
    driver: bridge